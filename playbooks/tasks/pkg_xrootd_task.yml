---
- name: Include repo_xrootd_task.yml
  ansible.builtin.include_tasks: repo_xrootd_task.yml

# Install XRootD packages from the official repository.
# Requires repo_xrootd_task.yml to have run first.
# Override xrootd_packages in group_vars/host_vars to change the set.

- name: Set XRootD package list
  ansible.builtin.set_fact:
    xrootd_packages: "{{ xrootd_packages | default(['xrootd-client', 'xrootd-server', 'python3-xrootd']) }}"

- name: Install XRootD packages (EL / Fedora)
  ansible.builtin.dnf:
    name: "{{ xrootd_packages }}"
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install XRootD packages (Debian / Ubuntu)
  ansible.builtin.apt:
    name: "{{ xrootd_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'
